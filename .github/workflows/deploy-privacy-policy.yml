name: Deploy Privacy Policy

on:
  push:
    branches:
      - main
    paths:
      - "privacy/**"
      - ".github/workflows/deploy-privacy-policy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://insanecoder789.github.io/ClassSync/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare privacy site
        run: |
          mkdir -p public/privacy
          cp privacy/index.html public/privacy/index.html
          mkdir -p public/privacy/assets
          cp app/src/main/res/drawable-nodpi/classsync_logo_generated.png public/privacy/assets/classsync-logo-generated.png
          cp design/opening/classsync-opening-dark-concept.png public/privacy/assets/classsync-opening-dark-concept.png
          build_sha="${GITHUB_SHA}"
          perl -0pi -e "s#</body>#  <!-- build-sha: ${build_sha} -->\n</body>#i" public/privacy/index.html
          cat <<'EOF' > public/index.html
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=./privacy/">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>ClassSync Privacy Policy</title>
            <link rel="canonical" href="./privacy/">
          </head>
          <body>
            <p>Redirecting to <a href="./privacy/">ClassSync Privacy Policy</a>...</p>
            <!-- build-sha: __BUILD_SHA__ -->
          </body>
          </html>
          EOF
          perl -0pi -e "s#__BUILD_SHA__#${build_sha}#g" public/index.html

      - name: Upload privacy policy artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Verify deployed privacy policy
        run: |
          url="https://insanecoder789.github.io/ClassSync/privacy/"
          marker="build-sha: ${GITHUB_SHA}"

          for attempt in $(seq 1 12); do
            if curl -fsSL "$url" | grep -F "$marker" >/dev/null; then
              echo "Verified deployed privacy policy for ${GITHUB_SHA}."
              exit 0
            fi

            echo "Verification attempt ${attempt} failed; waiting for GitHub Pages to finish publishing."
            sleep 10
          done

          echo "Expected build marker not found on the deployed privacy policy."
          exit 1

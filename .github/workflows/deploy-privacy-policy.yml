name: Deploy Privacy Policy

on:
  push:
    branches:
      - main
    paths:
      - "privacy/**"
      - "site/**"
      - ".github/workflows/deploy-privacy-policy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: https://insanecoder789.github.io/ClassSync/
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare public site
        run: |
          mkdir -p public/privacy
          cp privacy/index.html public/privacy/index.html
          mkdir -p public/terms
          cp site/terms.html public/terms/index.html
          mkdir -p public/privacy/assets
          mkdir -p public/assets
          mkdir -p public/screenshots
          cp app/src/main/res/drawable-nodpi/classsync_logo_generated.png public/privacy/assets/classsync-logo-generated.png
          cp app/src/main/res/drawable-nodpi/classsync_logo_generated.png public/assets/classsync-logo-generated.png
          cp design/opening/classsync-opening-dark-concept.png public/privacy/assets/classsync-opening-dark-concept.png
          cp design/opening/classsync-opening-dark-concept.png public/assets/classsync-opening-dark-concept.png
          cp docs/assets/classsync-banner.png public/assets/classsync-banner.png
          cp playstore_assets/diagrams/mermaid-system-blueprint.png public/assets/mermaid-system-blueprint.png
          cp playstore_assets/diagrams/mermaid-trust-boundary.png public/assets/mermaid-trust-boundary.png
          cp playstore_assets/screenshots/*.png public/screenshots/
          build_sha="${GITHUB_SHA}"
          perl -0pi -e "s#</body>#  <!-- build-sha: ${build_sha} -->\n</body>#i" public/privacy/index.html
          cp site/index.html public/index.html
          perl -0pi -e "s#</body>#  <!-- build-sha: ${build_sha} -->\n</body>#i" public/index.html
          perl -0pi -e "s#</body>#  <!-- build-sha: ${build_sha} -->\n</body>#i" public/terms/index.html

      - name: Upload privacy policy artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment_attempt_1
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 10000

      - name: Pause before retry 2
        if: steps.deployment_attempt_1.outcome == 'failure'
        run: sleep 15

      - name: Deploy to GitHub Pages (attempt 2)
        id: deployment_attempt_2
        if: steps.deployment_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 10000

      - name: Pause before retry 3
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure'
        run: sleep 20

      - name: Deploy to GitHub Pages (attempt 3)
        id: deployment_attempt_3
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v5
        with:
          timeout: 600000
          error_count: 30
          reporting_interval: 10000

      - name: Fail if all GitHub Pages deployment attempts failed
        if: steps.deployment_attempt_1.outcome == 'failure' && steps.deployment_attempt_2.outcome == 'failure' && steps.deployment_attempt_3.outcome == 'failure'
        run: |
          echo "GitHub Pages deployment failed after three attempts."
          exit 1

      - name: Check deployed privacy policy availability
        run: |
          url="https://insanecoder789.github.io/ClassSync/privacy/?build_sha=${GITHUB_SHA}"

          for attempt in $(seq 1 18); do
            if curl -fsSI -H "Cache-Control: no-cache" -H "Pragma: no-cache" "$url" >/dev/null; then
              echo "Privacy policy is reachable after deployment."
              exit 0
            fi

            echo "Availability check ${attempt} failed; waiting for GitHub Pages to finish publishing."
            sleep 15
          done

          echo "Privacy policy URL did not become reachable in time."
          exit 1
